<svg viewBox="0 0 640 310" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Badge taxonomy: three degree carousels feeding eight 21st-century skill badges, targeting badged certifications">
  <style>
    .d-title   { font: 600 11px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-ink,#1a1916); letter-spacing:.03em; }
    .d-sub     { font: 400 9px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-ink-muted,#5c5a55); letter-spacing:.02em; }
    .d-eyebrow { font: 400 9px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-telemetry,#1e7a4a); letter-spacing:.06em; }
    .d-meta    { font: 400 8px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-ink-muted,#5c5a55); letter-spacing:.02em; }
    .box       { fill: var(--color-surface,#f0ede7); stroke: var(--color-border,#d4cfc7); stroke-width:1; }
    .badge     { fill: var(--color-ld-wash,#f8ece1); stroke: var(--color-ld,#b5642a); stroke-width:1; }
    .cert      { fill: var(--color-surface,#f0ede7); stroke: var(--color-border,#d4cfc7); stroke-width:1.5; }
    .line      { stroke: var(--color-border,#d4cfc7); stroke-width:1.5; }
    .arr       { fill: var(--color-border,#d4cfc7); }
  </style>

  <!-- header -->
  <text class="d-title" x="20" y="16">BADGE TAXONOMY</text>
  <text class="d-meta"  x="20" y="30">65-course carousel  ·  May 2018 – Sept 2020  ·  Education Design Lab working group</text>
  <line class="line" x1="20" y1="40" x2="620" y2="40"/>

  <!-- ── COLUMN 1: Carousels (x 20–178) ── -->
  <text class="d-eyebrow" x="20" y="56">// carousels</text>

  <rect class="box" x="20" y="64" width="158" height="44" rx="3"/>
  <text class="d-title" x="99" y="82"  text-anchor="middle" dominant-baseline="middle">BBA</text>
  <text class="d-sub"   x="99" y="98"  text-anchor="middle" dominant-baseline="middle">20 courses</text>

  <rect class="box" x="20" y="120" width="158" height="44" rx="3"/>
  <text class="d-title" x="99" y="138" text-anchor="middle" dominant-baseline="middle">MBA</text>
  <text class="d-sub"   x="99" y="154" text-anchor="middle" dominant-baseline="middle">25 courses</text>

  <rect class="box" x="20" y="176" width="158" height="44" rx="3"/>
  <text class="d-title" x="99" y="194" text-anchor="middle" dominant-baseline="middle">DBA</text>
  <text class="d-sub"   x="99" y="210" text-anchor="middle" dominant-baseline="middle">15 courses</text>

  <text class="d-meta"  x="99" y="238" text-anchor="middle">65 courses  ·  3 carousels</text>

  <!-- collector: verticals from each box to x=182, then arrow right -->
  <line class="line" x1="178" y1="86"  x2="188" y2="86"/>
  <line class="line" x1="178" y1="142" x2="188" y2="142"/>
  <line class="line" x1="178" y1="198" x2="188" y2="198"/>
  <line class="line" x1="188" y1="86"  x2="188" y2="198"/>
  <line class="line" x1="188" y1="142" x2="207" y2="142"/>
  <polygon class="arr" points="207,138 215,142 207,146"/>

  <!-- ── COLUMN 2: Badge Taxonomy (x 218–452) ── -->
  <text class="d-eyebrow" x="218" y="56">// 21st-century skills badges</text>

  <!-- row 1 -->
  <rect class="badge" x="218" y="64" width="108" height="38" rx="3"/>
  <text class="d-title" x="272" y="83" text-anchor="middle" dominant-baseline="middle">Initiative</text>

  <rect class="badge" x="342" y="64" width="108" height="38" rx="3"/>
  <text class="d-title" x="396" y="83" text-anchor="middle" dominant-baseline="middle">Collaboration</text>

  <!-- row 2 -->
  <rect class="badge" x="218" y="114" width="108" height="38" rx="3"/>
  <text class="d-title" x="272" y="128" text-anchor="middle" dominant-baseline="middle">Creative</text>
  <text class="d-sub"   x="272" y="143" text-anchor="middle" dominant-baseline="middle">Problem-Solving</text>

  <rect class="badge" x="342" y="114" width="108" height="38" rx="3"/>
  <text class="d-title" x="396" y="128" text-anchor="middle" dominant-baseline="middle">Critical</text>
  <text class="d-sub"   x="396" y="143" text-anchor="middle" dominant-baseline="middle">Thinking</text>

  <!-- row 3 -->
  <rect class="badge" x="218" y="164" width="108" height="38" rx="3"/>
  <text class="d-title" x="272" y="178" text-anchor="middle" dominant-baseline="middle">Intercultural</text>
  <text class="d-sub"   x="272" y="193" text-anchor="middle" dominant-baseline="middle">Fluency</text>

  <rect class="badge" x="342" y="164" width="108" height="38" rx="3"/>
  <text class="d-title" x="396" y="183" text-anchor="middle" dominant-baseline="middle">Empathy</text>

  <!-- row 4 -->
  <rect class="badge" x="218" y="214" width="108" height="38" rx="3"/>
  <text class="d-title" x="272" y="228" text-anchor="middle" dominant-baseline="middle">Oral</text>
  <text class="d-sub"   x="272" y="243" text-anchor="middle" dominant-baseline="middle">Communication</text>

  <rect class="badge" x="342" y="214" width="108" height="38" rx="3"/>
  <text class="d-title" x="396" y="233" text-anchor="middle" dominant-baseline="middle">Resilience</text>

  <!-- collector: from each col to x=458, arrow right -->
  <line class="line" x1="450" y1="83"  x2="460" y2="83"/>
  <line class="line" x1="450" y1="233" x2="460" y2="233"/>
  <line class="line" x1="460" y1="83"  x2="460" y2="233"/>
  <line class="line" x1="460" y1="158" x2="476" y2="158"/>
  <polygon class="arr" points="476,154 484,158 476,162"/>

  <!-- ── COLUMN 3: Outcome (x 488–620) ── -->
  <text class="d-eyebrow" x="488" y="56">// pathway</text>

  <rect class="cert" x="488" y="64" width="132" height="54" rx="3"/>
  <text class="d-title" x="554" y="87"  text-anchor="middle" dominant-baseline="middle">Badged</text>
  <text class="d-title" x="554" y="104" text-anchor="middle" dominant-baseline="middle">Certifications</text>

  <line class="line" x1="554" y1="118" x2="554" y2="136"/>
  <polygon class="arr" points="550,136 554,144 558,136"/>

  <rect class="box" x="488" y="144" width="132" height="44" rx="3"/>
  <text class="d-title" x="554" y="162" text-anchor="middle" dominant-baseline="middle">Employer</text>
  <text class="d-sub"   x="554" y="178" text-anchor="middle" dominant-baseline="middle">Recognition</text>

  <!-- footer -->
  <line class="line" x1="20" y1="268" x2="620" y2="268"/>
  <text class="d-meta" x="20"  y="282">Completion criteria: custom per skill  ·  Canvas LMS  ·  No vendor lock-in</text>
  <text class="d-meta" x="20"  y="295">Vendors evaluated: Credly · Accredible · Portfolium  ·  Status: MVP shipped</text>
</svg>
