<svg viewBox="0 0 640 360" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="Data decommission pipeline: three programs through five functional teams, tagged and delivered under contractual deadline">
  <style>
    .d-title   { font: 600 11px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-ink,#1a1916); letter-spacing:.03em; }
    .d-sub     { font: 400 9px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-ink-muted,#5c5a55); letter-spacing:.02em; }
    .d-eyebrow { font: 400 9px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-telemetry,#1e7a4a); letter-spacing:.06em; }
    .d-meta    { font: 400 8px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-ink-muted,#5c5a55); letter-spacing:.02em; }
    .d-stat    { font: 600 13px/1 var(--font-mono,'JetBrains Mono',monospace); fill: var(--color-ink,#1a1916); }
    .box       { fill: var(--color-surface,#f0ede7); stroke: var(--color-border,#d4cfc7); stroke-width:1; }
    .team-box  { fill: var(--color-bg,#faf9f7); stroke: var(--color-border,#d4cfc7); stroke-width:1; }
    .tag-pkg   { fill: var(--color-eng-wash,#e1f2f2); stroke: var(--color-eng,#0d7d7d); stroke-width:1; }
    .tag-del   { fill: var(--color-gov-wash,#eeecf7); stroke: var(--color-gov,#574a93); stroke-width:1; }
    .outcome   { fill: var(--color-surface,#f0ede7); stroke: var(--color-border,#d4cfc7); stroke-width:1.5; }
    .line      { stroke: var(--color-border,#d4cfc7); stroke-width:1.5; }
    .arr       { fill: var(--color-border,#d4cfc7); }
  </style>

  <!-- header -->
  <text class="d-title" x="20" y="16">DATA DECOMMISSION PIPELINE</text>
  <text class="d-meta"  x="20" y="30">Jan – Sept 2021  ·  15-year partnership wind-down  ·  contractual separation agreement</text>
  <line class="line" x1="20" y1="40" x2="620" y2="40"/>

  <!-- ── ROW 1: Programs (y 48–100) ── -->
  <text class="d-eyebrow" x="20" y="56">// programs</text>

  <rect class="box" x="20"  y="64" width="172" height="40" rx="3"/>
  <text class="d-title" x="106" y="80"  text-anchor="middle" dominant-baseline="middle">MBA</text>
  <text class="d-sub"   x="106" y="95"  text-anchor="middle" dominant-baseline="middle">28-course carousel</text>

  <rect class="box" x="234" y="64" width="172" height="40" rx="3"/>
  <text class="d-title" x="320" y="80"  text-anchor="middle" dominant-baseline="middle">MS Finance</text>
  <text class="d-sub"   x="320" y="95"  text-anchor="middle" dominant-baseline="middle">26-course carousel</text>

  <rect class="box" x="448" y="64" width="172" height="40" rx="3"/>
  <text class="d-title" x="534" y="80"  text-anchor="middle" dominant-baseline="middle">MS Computer Science</text>
  <text class="d-sub"   x="534" y="95"  text-anchor="middle" dominant-baseline="middle">25-course carousel</text>

  <!-- arrow down to teams -->
  <line class="line" x1="106" y1="104" x2="106" y2="116"/>
  <line class="line" x1="320" y1="104" x2="320" y2="116"/>
  <line class="line" x1="534" y1="104" x2="534" y2="116"/>
  <line class="line" x1="106" y1="116" x2="534" y2="116"/>
  <line class="line" x1="320" y1="116" x2="320" y2="128"/>
  <polygon class="arr" points="316,128 320,136 324,128"/>

  <!-- ── ROW 2: Teams (y 140–184) ── -->
  <text class="d-eyebrow" x="20" y="150">// functional teams</text>

  <rect class="team-box" x="20"  y="157" width="102" height="32" rx="3"/>
  <text class="d-sub" x="71"  y="173" text-anchor="middle" dominant-baseline="middle">Project Mgmt</text>

  <rect class="team-box" x="134" y="157" width="102" height="32" rx="3"/>
  <text class="d-sub" x="185" y="173" text-anchor="middle" dominant-baseline="middle">Learning Design</text>

  <rect class="team-box" x="248" y="157" width="102" height="32" rx="3"/>
  <text class="d-sub" x="299" y="173" text-anchor="middle" dominant-baseline="middle">Multimedia</text>

  <rect class="team-box" x="362" y="157" width="102" height="32" rx="3"/>
  <text class="d-sub" x="413" y="173" text-anchor="middle" dominant-baseline="middle">Transcription</text>

  <rect class="team-box" x="476" y="157" width="102" height="32" rx="3"/>
  <text class="d-sub" x="527" y="173" text-anchor="middle" dominant-baseline="middle">QA</text>

  <!-- arrow down to taxonomy -->
  <line class="line" x1="320" y1="189" x2="320" y2="205"/>
  <polygon class="arr" points="316,205 320,213 324,205"/>

  <!-- ── ROW 3: Tagging Taxonomy (y 218–262) ── -->
  <text class="d-eyebrow" x="20" y="222">// tagging taxonomy  →  clause invoked  →  revised</text>

  <!-- initial scheme -->
  <rect class="tag-pkg" x="20"  y="230" width="124" height="36" rx="3"/>
  <text class="d-title" x="82"  y="248" text-anchor="middle" dominant-baseline="middle">Package</text>

  <rect class="box"     x="158" y="230" width="124" height="36" rx="3"/>
  <text class="d-title" x="220" y="248" text-anchor="middle" dominant-baseline="middle">Archive</text>

  <rect class="tag-del" x="296" y="230" width="124" height="36" rx="3"/>
  <text class="d-title" x="358" y="248" text-anchor="middle" dominant-baseline="middle">Delete</text>

  <!-- revised label -->
  <text class="d-sub" x="442" y="244" dominant-baseline="middle">→  purge clause:</text>
  <rect class="tag-del" x="530" y="230" width="88" height="36" rx="3"/>
  <text class="d-title" x="574" y="248" text-anchor="middle" dominant-baseline="middle">Purge</text>

  <!-- arrow down to outcome -->
  <line class="line" x1="320" y1="266" x2="320" y2="282"/>
  <polygon class="arr" points="316,282 320,290 324,282"/>

  <!-- ── ROW 4: Outcome (y 294–332) ── -->
  <text class="d-eyebrow" x="20" y="300">// delivery</text>

  <rect class="outcome" x="20"  y="308" width="138" height="40" rx="3"/>
  <text class="d-stat" x="89"  y="322" text-anchor="middle" dominant-baseline="middle">10,000+</text>
  <text class="d-sub"  x="89"  y="338" text-anchor="middle" dominant-baseline="middle">files delivered</text>

  <rect class="outcome" x="172" y="308" width="138" height="40" rx="3"/>
  <text class="d-stat" x="241" y="322" text-anchor="middle" dominant-baseline="middle">500+ GB</text>
  <text class="d-sub"  x="241" y="338" text-anchor="middle" dominant-baseline="middle">data transferred</text>

  <rect class="outcome" x="324" y="308" width="138" height="40" rx="3"/>
  <text class="d-stat" x="393" y="322" text-anchor="middle" dominant-baseline="middle">100%</text>
  <text class="d-sub"  x="393" y="338" text-anchor="middle" dominant-baseline="middle">on-time delivery</text>

  <rect class="outcome" x="476" y="308" width="138" height="40" rx="3"/>
  <text class="d-stat" x="545" y="322" text-anchor="middle" dominant-baseline="middle">Zero-gap</text>
  <text class="d-sub"  x="545" y="338" text-anchor="middle" dominant-baseline="middle">completeness</text>
</svg>
